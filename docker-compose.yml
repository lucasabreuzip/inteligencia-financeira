services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finance_backend
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_CHAT_MODEL: "${OPENAI_CHAT_MODEL:-gpt-4o-mini}"
      OPENAI_EMBEDDING_MODEL: "${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}"
      APP_ENV: "${APP_ENV:-production}"
      APP_HOST: "${APP_HOST:-0.0.0.0}"
      APP_PORT: "${APP_PORT:-8000}"
      CORS_ORIGINS: "${CORS_ORIGINS:?CORS_ORIGINS obrigatorio}"
      MAX_UPLOAD_MB: "${MAX_UPLOAD_MB:-100}"
      MAX_CONCURRENT_PIPELINES: "${MAX_CONCURRENT_PIPELINES:-5}"
      DB_POOL_MIN: "${DB_POOL_MIN:-2}"
      DB_POOL_MAX: "${DB_POOL_MAX:-20}"
      CHAT_RATE_LIMIT: "${CHAT_RATE_LIMIT:-20/minute}"
      UPLOAD_RATE_LIMIT: "${UPLOAD_RATE_LIMIT:-5/minute}"
      API_KEY: "${API_KEY:-}"
      LANGFUSE_PUBLIC_KEY: "${LANGFUSE_PUBLIC_KEY:-}"
      LANGFUSE_SECRET_KEY: "${LANGFUSE_SECRET_KEY:-}"
      LANGFUSE_HOST: "${LANGFUSE_HOST:-https://cloud.langfuse.com}"
      DATA_DIR: "/app/data"
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      UPLOAD_DIR: "/app/data/uploads"
    volumes:
      - backend_data_v2:/app/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - finance_net

  db:
    image: pgvector/pgvector:pg16
    container_name: finance_db
    environment:
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER obrigatorio}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatorio}"
      POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB obrigatorio}"
    volumes:
      - pg_data_v2:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 20s
    networks:
      - finance_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finance_frontend
    environment:
      NODE_ENV: "production"
      BACKEND_INTERNAL_URL: "http://backend:8000"
      BACKEND_API_KEY: "${API_KEY:-}"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3001:3000"
    restart: unless-stopped
    networks:
      - finance_net

volumes:
  backend_data_v2:
    driver: local
  pg_data_v2:
    driver: local

networks:
  finance_net:
    driver: bridge
